<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <pattern id="puzzle" width="150" height="150" patternUnits="userSpaceOnUse">
      <path
        d="
        M 0 0
        H 50
        C 60 0 60 20 75 20
        C 90 20 90 0 100 0
        H 150

        V 50
        C 150 60 130 60 130 75
        C 130 90 150 90 150 100
        V 150

        H 100
        C 90 150 90 130 75 130
        C 60 130 60 150 50 150
        H 0

        V 100
        C 0 90 20 90 20 75
        C 20 60 0 60 0 50
        Z
        "
        fill="none"
        stroke="#000"
        stroke-width="1"
        vector-effect="non-scaling-stroke"
      />

      <!-- повтор справа -->
      <path
        d="
        M 150 0
        H 200
        C 210 0 210 20 225 20
        C 240 20 240 0 250 0
        H 300

        V 50
        C 300 60 280 60 280 75
        C 280 90 300 90 300 100
        V 150

        H 250
        C 240 150 240 130 225 130
        C 210 130 210 150 200 150
        H 150

        V 100
        C 150 90 170 90 170 75
        C 170 60 150 60 150 50
        Z
        "
        fill="none"
        stroke="#000"
        stroke-width="1"
        vector-effect="non-scaling-stroke"
      />

      <!-- повтор снизу -->
      <path
        d="
        M 0 150
        H 50
        C 60 150 60 170 75 170
        C 90 170 90 150 100 150
        H 150

        V 200
        C 150 210 130 210 130 225
        C 130 240 150 240 150 250
        V 300

        H 100
        C 90 300 90 280 75 280
        C 60 280 60 300 50 300
        H 0

        V 250
        C 0 240 20 240 20 225
        C 20 210 0 210 0 200
        Z
        "
        fill="none"
        stroke="#000"
        stroke-width="1"
        vector-effect="non-scaling-stroke"
      />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#puzzle)" />
</svg>