<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT svg</title>
</head>
<body>

    <style>
        :root {
            --coffee: #1f1f1f;
            --mint: #6fcf97;
            --beige: #f4efe7;
            --glass: #ffffff;
        }
    
        body {
            margin: 0;
            background: var(--beige);
        }
    
        .drinks-set {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            justify-content: center;
            padding: 60px 20px;
            font-family: 'Segoe UI', sans-serif;
        }
    
        .drink {
            width: 140px;
            text-align: center;
            transition: 0.3s ease;
        }
    
        .drink:hover {
            transform: translateY(-8px) scale(1.05);
        }
    
        svg {
            width: 90px;
            height: 90px;
            filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.08));
        }
    
        .label {
            margin-top: 12px;
            font-size: 14px;
            color: var(--coffee);
        }
    
        /* glass */
        .glass {
            fill: var(--glass);
            stroke: var(--coffee);
            stroke-width: 1.3;
        }
    
        /* straw */
        .straw {
            stroke: var(--coffee);
            stroke-width: 2;
            stroke-linecap: round;
        }
    
        /* lemon */
        .lemon {
            fill: #ffd166;
            stroke: #e0a800;
            stroke-width: 1;
        }
    
        /* mint */
        .mint {
            fill: var(--mint);
        }

        .brand-header {
    text-align: center;
    padding: 40px 20px 20px;
    background: #f4efe7;
}

.logo-wrap {
    width: 110px;
    height: 110px;
    margin: 0 auto 15px;
    border-radius: 50%;
    background: #7fd1b9;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.logo-wrap svg {
    width: 70px;
    height: 70px;
}

.brand-title {
    font-size: 22px;
    letter-spacing: 2px;
    color: #2c2c2c;
}

.brand-sub {
    font-size: 12px;
    color: #777;
    margin-top: 5px;
}
    </style>
    
    
    <div class="drinks-set">
    
        <!-- ICE LATTE -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <!-- straw -->
                <line class="straw" x1="40" y1="8" x2="32" y2="30" />
    
                <!-- glass -->
                <rect class="glass" x="18" y="10" width="28" height="44" rx="10" />
    
                <!-- drink layers -->
                <rect x="18" y="22" width="28" height="32" rx="10" fill="#c8a97e" />
                <rect x="18" y="22" width="28" height="8" rx="10" fill="#efe1d1" />
    
                <!-- ice -->
                <rect x="24" y="36" width="5" height="5" fill="#fff" />
                <rect x="32" y="40" width="5" height="5" fill="#fff" />
    
            </svg>
            <div class="label">Iced Latte</div>
        </div>
    
    
        <!-- MOJITO -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <line class="straw" x1="42" y1="8" x2="34" y2="30" />
    
                <rect class="glass" x="18" y="10" width="28" height="44" rx="10" />
    
                <rect x="18" y="22" width="28" height="32" rx="10" fill="#c7f2e3" />
    
                <!-- mint -->
                <ellipse class="mint" cx="30" cy="40" rx="5" ry="3" />
                <ellipse class="mint" cx="36" cy="32" rx="4" ry="3" />
    
                <!-- lime -->
                <circle cx="34" cy="45" r="4" fill="#9be15d" />
    
            </svg>
            <div class="label">Mojito</div>
        </div>
    
    
        <!-- LEMONADE -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <line class="straw" x1="40" y1="8" x2="32" y2="30" />
    
                <rect class="glass" x="18" y="10" width="28" height="44" rx="10" />
    
                <rect x="18" y="22" width="28" height="32" rx="10" fill="#fff3b0" />
    
                <!-- lemon slice -->
                <circle class="lemon" cx="44" cy="20" r="6" />
                <line x1="44" y1="14" x2="44" y2="26" stroke="#fff" />
                <line x1="38" y1="20" x2="50" y2="20" stroke="#fff" />
    
            </svg>
            <div class="label">Lemonade</div>
        </div>
    
    
        <!-- BLUE LAGOON -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <line class="straw" x1="40" y1="10" x2="32" y2="28" />
    
                <path d="M20 10 Q32 2 44 10 L40 54 Q32 60 24 54 Z" fill="#4cc9f0" stroke="#1f1f1f" stroke-width="1.3" />
    
                <!-- lemon -->
                <circle class="lemon" cx="44" cy="18" r="5" />
    
            </svg>
            <div class="label">Blue Lagoon</div>
        </div>
    
    
        <!-- SMOOTHIE -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <line class="straw" x1="42" y1="8" x2="34" y2="30" />
    
                <rect class="glass" x="18" y="10" width="28" height="44" rx="10" />
    
                <rect x="18" y="22" width="28" height="32" rx="10" fill="#b07cff" />
    
                <!-- berries -->
                <circle cx="30" cy="40" r="3" fill="#7b2cbf" />
                <circle cx="36" cy="36" r="3" fill="#9d4edd" />
    
            </svg>
            <div class="label">Smoothie</div>
        </div>
    
        <!-- COFFEE -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <!-- steam -->
                <path d="M28 12 Q30 8 28 4" stroke="#999" fill="none" />
                <path d="M34 12 Q36 8 34 4" stroke="#999" fill="none" />
    
                <!-- cup -->
                <rect x="18" y="20" width="28" height="18" rx="6" class="glass" />
                <rect x="18" y="20" width="28" height="12" rx="6" fill="#6f4e37" />
    
                <!-- handle -->
                <path d="M46 24 Q54 28 46 34" fill="none" stroke="#1f1f1f" />
    
            </svg>
            <div class="label">Americano</div>
        </div>
    
    
        <!-- CAPPUCCINO -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <!-- steam -->
                <path d="M28 12 Q30 8 28 4" stroke="#999" fill="none" />
                <path d="M34 12 Q36 8 34 4" stroke="#999" fill="none" />
    
                <rect x="18" y="20" width="28" height="18" rx="6" class="glass" />
    
                <!-- coffee -->
                <rect x="18" y="24" width="28" height="10" rx="6" fill="#8d5524" />
    
                <!-- foam -->
                <ellipse cx="32" cy="22" rx="14" ry="5" fill="#f5efe6" />
    
                <!-- handle -->
                <path d="M46 24 Q54 28 46 34" fill="none" stroke="#1f1f1f" />
    
            </svg>
            <div class="label">Cappuccino</div>
        </div>
    
    
        <!-- GREEN TEA -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <!-- steam -->
                <path d="M28 12 Q30 8 28 4" stroke="#999" fill="none" />
                <path d="M34 12 Q36 8 34 4" stroke="#999" fill="none" />
    
                <rect x="18" y="20" width="28" height="18" rx="6" class="glass" />
    
                <!-- tea -->
                <rect x="18" y="24" width="28" height="10" rx="6" fill="#a8e6cf" />
    
                <!-- leaf -->
                <ellipse cx="32" cy="28" rx="4" ry="2" fill="#6fcf97" />
    
                <!-- handle -->
                <path d="M46 24 Q54 28 46 34" fill="none" stroke="#1f1f1f" />
    
            </svg>
            <div class="label">Green Tea</div>
        </div>
    
    
        <!-- TEA WITH LEMON -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
    
                <!-- steam -->
                <path d="M28 12 Q30 8 28 4" stroke="#999" fill="none" />
                <path d="M34 12 Q36 8 34 4" stroke="#999" fill="none" />
    
                <rect x="18" y="20" width="28" height="18" rx="6" class="glass" />
    
                <!-- tea -->
                <rect x="18" y="24" width="28" height="10" rx="6" fill="#ffd166" />
    
                <!-- lemon -->
                <circle cx="40" cy="22" r="4" fill="#ffd166" stroke="#e0a800" />
    
                <!-- handle -->
                <path d="M46 24 Q54 28 46 34" fill="none" stroke="#1f1f1f" />
    
            </svg>
            <div class="label">Tea with Lemon</div>
        </div>

        <!-- MARGARITA -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
        
                <!-- glass -->
                <path d="M16 26 L48 26 L32 38 Z" class="glass" />
                <line x1="32" y1="38" x2="32" y2="54" stroke="#1f1f1f" />
                <ellipse cx="32" cy="54" rx="8" ry="2" fill="#ddd" />
        
                <!-- drink -->
                <path d="M18 26 L46 26 L32 36 Z" fill="#caffbf" />
        
                <!-- lime -->
                <circle cx="44" cy="24" r="4" fill="#9be15d" />
        
            </svg>
            <div class="label">Margarita</div>
        </div>
        
        <!-- MARTINI -->
        <div class="drink">
            <svg viewBox="0 0 64 64">
        
                <!-- glass -->
                <path d="M18 20 L46 20 L32 34 Z" class="glass" />
                <line x1="32" y1="34" x2="32" y2="54" stroke="#1f1f1f" />
                <ellipse cx="32" cy="54" rx="8" ry="2" fill="#ddd" />
        
                <!-- drink -->
                <path d="M20 20 L44 20 L32 32 Z" fill="#e0fbfc" />
        
                <!-- olive -->
                <circle cx="36" cy="26" r="3" fill="#6a994e" />
        
            </svg>
            <div class="label">Martini</div>
        </div>

            <!-- WAFFLE CLASSIC -->
            <div class="drink">
                <svg viewBox="0 0 64 64">
            
                    <!-- waffle base -->
                    <rect x="14" y="14" width="36" height="36" rx="6" fill="#e0a96d" stroke="#c68b59" />
            
                    <!-- grid -->
                    <line x1="14" y1="26" x2="50" y2="26" stroke="#c68b59" />
                    <line x1="14" y1="38" x2="50" y2="38" stroke="#c68b59" />
                    <line x1="26" y1="14" x2="26" y2="50" stroke="#c68b59" />
                    <line x1="38" y1="14" x2="38" y2="50" stroke="#c68b59" />
            
                    <!-- topping -->
                    <circle cx="32" cy="32" r="4" fill="#7b2cbf" />
            
                </svg>
                <div class="label">Classic Waffle</div>
            </div>
            
            
            <!-- WAFFLE STRAWBERRY -->
            <div class="drink">
                <svg viewBox="0 0 64 64">
            
                    <rect x="14" y="14" width="36" height="36" rx="6" fill="#e0a96d" />
            
                    <!-- grid -->
                    <line x1="14" y1="26" x2="50" y2="26" stroke="#c68b59" />
                    <line x1="14" y1="38" x2="50" y2="38" stroke="#c68b59" />
                    <line x1="26" y1="14" x2="26" y2="50" stroke="#c68b59" />
                    <line x1="38" y1="14" x2="38" y2="50" stroke="#c68b59" />
            
                    <!-- strawberry -->
                    <circle cx="28" cy="30" r="3" fill="#ff4d6d" />
                    <circle cx="36" cy="34" r="3" fill="#ff4d6d" />
            
                </svg>
                <div class="label">Strawberry Waffle</div>
            </div>
            
            
            <!-- WAFFLE CHOCOLATE -->
            <div class="drink">
                <svg viewBox="0 0 64 64">
            
                    <rect x="14" y="14" width="36" height="36" rx="6" fill="#e0a96d" />
            
                    <!-- chocolate -->
                    <path d="M14 30 Q32 20 50 30" stroke="#5a3e2b" stroke-width="3" fill="none" />
            
                    <!-- grid -->
                    <line x1="14" y1="38" x2="50" y2="38" stroke="#c68b59" />
                    <line x1="26" y1="14" x2="26" y2="50" stroke="#c68b59" />
                    <line x1="38" y1="14" x2="38" y2="50" stroke="#c68b59" />
            
                </svg>
                <div class="label">Choco Waffle</div>
            </div>
    
    </div>
    
</body>
</html>
