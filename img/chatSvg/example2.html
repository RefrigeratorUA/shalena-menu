<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body {
            margin: 0;
            background: #f7f7f7;
            font-family: 'Segoe UI', sans-serif;
            color: #111;
        }
    
        .menu {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }
    
        /* TITLE */
        .brand {
            text-align: center;
            margin-bottom: 40px;
        }
    
        .logo {
            width: 120px;
            height: 120px;
            border: 2px solid #111;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    
        .brand h1 {
            letter-spacing: 6px;
            font-size: 32px;
            margin: 10px 0 5px;
        }
    
        .brand p {
            font-size: 12px;
            letter-spacing: 3px;
        }
    
        /* SECTIONS */
        .section {
            margin: 40px 0;
        }
    
        .section-title {
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
            letter-spacing: 3px;
            border: 2px solid #111;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
        }
    
        /* GRID */
        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }
    
        .item {
            width: 120px;
            text-align: center;
        }
    
        .item svg {
            width: 70px;
            height: 70px;
            stroke: #111;
            fill: none;
            stroke-width: 1.5;
        }
    
        .name {
            margin-top: 8px;
            font-size: 13px;
        }
    
        .price {
            font-size: 12px;
            margin-top: 3px;
        }
    
        /* waffle fill */
        .fill {
            fill: #111;
        }
    
        /* divider */
        .divider {
            text-align: center;
            margin: 30px 0;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
    
    <div class="menu">
    
        <!-- BRAND -->
        <div class="brand">
            <div class="logo">
                <!-- simple logo -->
                <svg viewBox="0 0 64 64">
                    <rect x="20" y="28" width="24" height="12" rx="4" />
                    <path d="M44 30 Q52 34 44 38" />
                    <rect x="26" y="18" width="12" height="8" />
                </svg>
            </div>
            <h1>SHALENA</h1>
            <p>COFFEE & WAFFLES</p>
        </div>
    
        <!-- COLD DRINKS -->
        <div class="section">
            <div class="section-title">ХОЛОДНЫЕ НАПИТКИ</div>
    
            <div class="grid">
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <rect x="18" y="10" width="28" height="44" rx="8" />
                        <line x1="40" y1="10" x2="32" y2="30" />
                    </svg>
                    <div class="name">Айс латте</div>
                    <div class="price">230 ₴</div>
                </div>
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <rect x="18" y="10" width="28" height="44" rx="8" />
                        <circle cx="44" cy="20" r="5" />
                    </svg>
                    <div class="name">Лимонад</div>
                    <div class="price">190 ₴</div>
                </div>
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <rect x="18" y="10" width="28" height="44" rx="8" />
                        <ellipse cx="32" cy="38" rx="6" ry="3" />
                    </svg>
                    <div class="name">Мохито</div>
                    <div class="price">210 ₴</div>
                </div>
    
            </div>
        </div>
    
        <!-- HOT -->
        <div class="section">
            <div class="section-title">ГОРЯЧИЕ НАПИТКИ</div>
    
            <div class="grid">
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <rect x="18" y="24" width="28" height="14" rx="6" />
                        <path d="M28 16 Q30 10 28 6" />
                    </svg>
                    <div class="name">Эспрессо</div>
                    <div class="price">120 ₴</div>
                </div>
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <rect x="18" y="24" width="28" height="14" rx="6" />
                        <ellipse cx="32" cy="22" rx="12" ry="4" />
                    </svg>
                    <div class="name">Капучино</div>
                    <div class="price">190 ₴</div>
                </div>
    
            </div>
        </div>
    
        <!-- COCKTAILS -->
        <div class="section">
            <div class="section-title">КОКТЕЙЛИ</div>
    
            <div class="grid">
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <path d="M18 24 L46 24 L32 34 Z" />
                        <line x1="32" y1="34" x2="32" y2="54" />
                    </svg>
                    <div class="name">Маргарита</div>
                    <div class="price">290 ₴</div>
                </div>
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <rect x="18" y="18" width="28" height="26" rx="6" />
                    </svg>
                    <div class="name">Негрони</div>
                    <div class="price">280 ₴</div>
                </div>
    
            </div>
        </div>
    
        <!-- WAFFLES -->
        <div class="section">
            <div class="section-title">ВАФЛИ</div>
    
            <div class="grid">
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <rect x="14" y="14" width="36" height="36" rx="6" />
                        <line x1="14" y1="26" x2="50" y2="26" />
                        <line x1="26" y1="14" x2="26" y2="50" />
                    </svg>
                    <div class="name">Классическая</div>
                    <div class="price">180 ₴</div>
                </div>
    
                <div class="item">
                    <svg viewBox="0 0 64 64">
                        <rect x="14" y="14" width="36" height="36" rx="6" />
                        <circle cx="32" cy="32" r="4" class="fill" />
                    </svg>
                    <div class="name">С шоколадом</div>
                    <div class="price">210 ₴</div>
                </div>
    
            </div>
        </div>
    
        <div class="divider">
            НАСЛАЖДАЙСЯ КАЖДЫМ МОМЕНТОМ
        </div>
    
    </div>
</body>
</html>
